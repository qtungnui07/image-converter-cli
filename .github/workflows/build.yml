name: Build and Release EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pillow pillow-heif tqdm

    - name: Build EXE
      run: |
        pyinstaller --onefile --console --name "img" --collect-all pillow-heif img.py

    - name: Create Zip Package
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        mkdir package
        copy dist/img.exe package/
        copy setup.bat package/
        Compress-Archive -Path package/* -DestinationPath "$tag.zip"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ github.ref_name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}